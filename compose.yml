services:
  postgres:
    image: postgres:16-alpine
    container_name: medicab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-medicab}
      POSTGRES_USER: ${POSTGRES_USER:-medicab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medicab_dev}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-54329}:5432"
    volumes:
      - medicab_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-medicab} -d ${POSTGRES_DB:-medicab}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  medicab_postgres_data:
